# Token Trail - Full stack with Docker Compose
# Run: docker compose up --build
# Prerequisites: Docker, copy .env from .env.example

services:
  mongodb:
    image: mongo:7
    container_name: token-trail-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: token-trail-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      # Live dev: mount backend for hot reload
      - ./backend:/app
      - ./uploads:/app/uploads

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: token-trail-worker
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: token-trail-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    volumes:
      # Live dev: mount frontend for hot reload
      - ./frontend:/app

volumes:
  mongodb_data:
